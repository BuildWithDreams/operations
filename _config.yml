title: BWD Operations
description: Living operations documentation for BuildWithDreams infrastructure
baseurl: "/operations"
url: "https://buildwithdreams.github.io/operations"

# Use gem-based theme (GitHub Pages whitelisted)
theme: just-the-docs

# Just The Docs settings
nav_include: true
heading_anchors: true

# Navigation structure
navigation:
  - title: Home
    url: /
  - title: Runbooks
    url: /runbooks/
    pages:
      - title: Add rpcallowip for VRSCTEST
        url: /runbooks/vrsctest-rpcallowip/
      - title: Deploy RPC Server on VRSCTEST
        url: /runbooks/vrsctest-rpc-server-deploy/
  - title: Infrastructure
    url: /infrastructure/
  - title: Playbooks
    url: /playbooks/

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      theme: dark-mode
